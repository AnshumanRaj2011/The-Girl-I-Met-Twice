<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Confession</title><style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffeaf4);
overflow:hidden;
font-family:'Playfair Display',serif;
transition:background 2s;
}

/* Countdown */

#countdown{
font-size:120px;
color:#ff2e6e;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff80bf;
animation:pulse 1s infinite alternate;
z-index:5;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* Confession text */

#loveText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
font-size:64px;
color:#ff0066;
font-style:italic;
text-align:center;
padding:0 20px;
line-height:1.3;
opacity:0;
transition:1.5s;
text-shadow:
0 0 15px pink,
0 0 30px #ff4da6,
0 0 60px #ff66cc,
0 0 80px #ff99dd;
z-index:5;
}

#loveText.show{
opacity:1;
transform:translate(-50%,-50%) scale(1.2);
animation:glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
from{transform:translate(-50%,-50%) scale(1.2);}
to{transform:translate(-50%,-50%) scale(1.25);}
}

/* Floating hearts */

.bg-heart{
position:fixed;
bottom:-80px;
color:#ff4da6;
font-size:22px;
opacity:0.8;
pointer-events:none;
animation:floatHeart linear forwards;
text-shadow:0 0 10px pink,0 0 20px #ff66cc;
}

@keyframes floatHeart{
0%{
transform:translateY(0) scale(0.6);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

/* Sparkle hearts near text */

.spark{
position:absolute;
color:#ff4da6;
font-size:16px;
animation:sparkMove 3s linear forwards;
pointer-events:none;
}

@keyframes sparkMove{
0%{opacity:0; transform:scale(0.5);}
30%{opacity:1;}
100%{opacity:0; transform:translateY(-120px) scale(1.4);}
}

/* Mobile optimization */

@media (max-width:600px){

#countdown{
font-size:80px;
}

#loveText{
font-size:36px;
}

}

</style></head><body><div id="countdown">3</div><div id="loveText">
<i>I Love You Sakshi</i>
</div><audio id="loveAudio">
<source src="iloveyou.mp3" type="audio/mpeg">
</audio><script>

let count = 3;

const counter = document.getElementById("countdown");
const love = document.getElementById("loveText");
const audio = document.getElementById("loveAudio");

/* Countdown */

const timer = setInterval(()=>{

counter.innerHTML = count;

if(count === 0){

clearInterval(timer);

counter.style.display="none";

/* brighten background */

document.body.style.background="linear-gradient(135deg,#ffc1d6,#ffe3ef,#fff0f6)";

love.classList.add("show");

/* play audio */

audio.volume=1;
audio.play().catch(()=>{});

/* floating hearts */

setInterval(createBgHeart,500);

/* sparkle hearts */

setInterval(createSpark,800);

}

count--;

},1000);

/* floating hearts */

function createBgHeart(){

const heart=document.createElement("div");
heart.classList.add("bg-heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*26)+"px";
heart.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},11000);

}

/* sparkle hearts */

function createSpark(){

const spark=document.createElement("div");
spark.classList.add("spark");
spark.innerHTML="❤";

spark.style.left=(window.innerWidth/2 + (Math.random()*200-100))+"px";
spark.style.top=(window.innerHeight/2 + (Math.random()*80-40))+"px";

document.body.appendChild(spark);

setTimeout(()=>{
spark.remove();
},3000);

}

</script></body>
</html>
