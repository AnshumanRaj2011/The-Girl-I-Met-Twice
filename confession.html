<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confession</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
font-family:serif;
}

/* countdown text */

#countdown{
font-size:120px;
color:white;
}

/* final text */

#loveText{
position:absolute;
font-size:60px;
color:#ff4da6;
font-style:italic;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff66cc,
0 0 60px #ff99dd;
opacity:0;
transform:scale(0.8);
transition:2s;
}

#loveText.show{
opacity:1;
transform:scale(1.2);
}

</style>

</head>

<body>

<div id="countdown">3</div>

<div id="loveText">
I LOVE YOU SAKSHI
</div>

<audio id="loveAudio">
<source src="iloveyou.mp3" type="audio/mpeg">
</audio>

<script>

let count=3;
const counter=document.getElementById("countdown");
const love=document.getElementById("loveText");
const audio=document.getElementById("loveAudio");

const timer=setInterval(()=>{

count--;

if(count>0){
counter.innerHTML=count;
}

else{

clearInterval(timer);

counter.style.display="none";

love.classList.add("show");

audio.play();

}

},1000);

</script>

</body>
</html>
