<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Confession</title><style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffeaf4);
overflow:hidden;
font-family:'Playfair Display',serif;
}

/* Countdown */

#countdown{
font-size:110px;
color:#ff2e6e;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff80bf;
animation:pulse 1s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

/* Love text */

#loveText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.9);
font-size:60px;
color:#ff0066;
font-style:italic;
text-align:center;
opacity:0;
transition:1s;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff66cc;
}

#loveText.show{
opacity:1;
transform:translate(-50%,-50%) scale(1.1);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px pink,0 0 20px #ff4da6;
}
to{
text-shadow:0 0 20px pink,0 0 40px #ff4da6,0 0 80px #ff66cc;
}
}

/* Button */

#confessBtn{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-40px;
color:#ff4da6;
font-size:18px;
pointer-events:none;
opacity:0.8;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:0;
}
30%{opacity:1;}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

/* Explosion hearts */

.explosion{
position:fixed;
font-size:22px;
color:#ff4da6;
pointer-events:none;
animation:explode 2.5s linear forwards;
}

@keyframes explode{
0%{
transform:scale(0.5);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(1.8);
opacity:0;
}
}

/* Mobile */

@media(max-width:600px){

#countdown{font-size:80px;}
#loveText{font-size:36px;}

}

</style></head><body><div id="countdown">3</div><div id="loveText">
<i>I Love You Sakshi</i>
</div><audio id="loveAudio">
<source src="FirstTry.mp3" type="audio/mpeg">
</audio><button id="confessBtn" onclick="playConfession()">
Love Confession ❤️
</button><script>

let count=3;

const counter=document.getElementById("countdown");
const love=document.getElementById("loveText");
const btn=document.getElementById("confessBtn");
const audio=document.getElementById("loveAudio");

/* countdown */

const timer=setInterval(()=>{

if(count>0){
counter.innerHTML=count;
}

if(count===0){

counter.innerHTML="💗";

setTimeout(()=>{

counter.style.display="none";

love.classList.add("show");

btn.style.display="block";

/* smooth hearts */

setInterval(createHeart,900);

},700);

clearInterval(timer);

}

count--;

},1000);

/* play audio */

function playConfession(){
audio.currentTime=0;
audio.play();
}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(16+Math.random()*12)+"px";
heart.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),9000);

}

/* ending effect */

audio.addEventListener("ended",()=>{

for(let i=0;i<60;i++){

const heart=document.createElement("div");

heart.className="explosion";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

});

</script></body>
</html>
